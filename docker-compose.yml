services:
  db:
    image: mysql:8.0
    container_name: poder_verde_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: poder_verde_hrm
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql  
      - ./poder_verde_hrm.sql:/docker-entrypoint-initdb.d/01_poder_verde_hrm.sql:ro

  backend:
    build: ./backend
    container_name: poder_verde_backend
    environment:
      PORT: 4000
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: poder_verde_hrm
      JWT_SECRET: poder-verde-dev-secret
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app:Z
      - /app/node_modules
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: poder_verde_frontend
    environment:
      VITE_API_URL: http://localhost:4000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app:Z
      - /app/node_modules
    depends_on:
      - backend

volumes:
  db_data:
